{% extends 'base.html' %}
  {% block content %}
  <h2>Admin Dashboard</h2>
  <div class="row mt-4">
      <div class="col-md-6">
          <div class="card p-3">
              <h4>Users</h4>
              <table class="table table-sm">
                  <tr><th>Name</th><th>Role</th><th>Email</th></tr>
                  {% for u in users %}
                  <tr><td>{{ u.name }}</td><td>{{ u.role }}</td><td>{{ u.email }}</td></tr>
                  {% endfor %}
              </table>
          </div>
      </div>
      <div class="col-md-6">
          <div class="card p-3">
              <h4>System Overview</h4>
              <p>Total Complaints: {{ complaints|length }}</p>
              <a href="/analytics" class="btn btn-info w-100">View Detailed Analytics</a>
          </div>
      </div>
  </div>
  {% endblock %}
