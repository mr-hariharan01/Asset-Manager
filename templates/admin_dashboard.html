{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <h2 class="fw-bold mb-4">Admin Dashboard</h2>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-transparent py-3 border-0">
                    <h5 class="fw-bold mb-0">User Management</h5>
                </div>
                <div class="table-responsive p-3">
                    <table class="table table-hover align-middle table-sm">
                        <thead class="table-light">
                            <tr><th>Name</th><th>Role</th><th>Email</th></tr>
                        </thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td>{{ u.name }}</td>
                                <td><span class="badge bg-secondary-subtle text-secondary rounded-pill px-3">{{ u.role }}</span></td>
                                <td class="small">{{ u.email }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm text-center p-4">
                <h5 class="fw-bold mb-3">System Health</h5>
                <div class="display-6 fw-bold text-primary mb-2">{{ complaints|length }}</div>
                <p class="text-muted small mb-4">Total Active Complaints</p>
                <a href="/analytics" class="btn btn-dark rounded-pill w-100 py-2">
                    <i class="fas fa-chart-pie me-2"></i>Full Analytics
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
