{% extends 'base.html' %}
  {% block content %}
  <h2 class="mb-3">Interactive Issue Map</h2>
  <div class="card p-2">
      <div id="map" style="height: 600px; width: 100%;"></div>
  </div>
  <script>
      var map = L.map('map').setView([11.1271, 78.6569], 7); // Default to Tamil Nadu approx
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      var complaints = {{ complaints|tojson }};
      
      // Fit bounds if we have points
      if(complaints.length > 0) {
          var bounds = [];
          complaints.forEach(function(c) {
              if(c.lat && c.lng) {
                  var markerColor = c.status === 'Resolved' ? 'green' : 'red';
                  var marker = L.circleMarker([c.lat, c.lng], {
                      color: markerColor,
                      radius: 8,
                      fillOpacity: 0.8
                  }).addTo(map);
                  marker.bindPopup("<b>" + c.title + "</b><br>Status: " + c.status + "<br>Priority: " + c.priority);
                  bounds.push([c.lat, c.lng]);
              }
          });
          if(bounds.length > 0) {
              map.fitBounds(bounds);
          }
      }
  </script>
  {% endblock %}
