{% extends 'base.html' %}
  {% block content %}
  <div class="row justify-content-center">
      <div class="col-md-6">
          <div class="card p-4">
              <h3 class="text-center mb-4">Login</h3>
              <form method="POST">
                  <div class="mb-3">
                      <label>Email</label>
                      <input type="email" name="email" class="form-control" required value="citizen@test.com">
                  </div>
                  <div class="mb-3">
                      <label>Password</label>
                      <input type="password" name="password" class="form-control" required value="citizen123">
                  </div>
                  <button type="submit" class="btn btn-saffron w-100 text-white">Login</button>
              </form>
              <div class="mt-3 text-center">
                  <p>Demo Accounts: <br>
                  citizen@test.com / citizen123 <br>
                  ward@test.com / ward123 <br>
                  officer@test.com / officer123 <br>
                  president@test.com / president123 <br>
                  admin@test.com / admin123</p>
              </div>
          </div>
      </div>
  </div>
  {% endblock %}
